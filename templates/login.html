
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Login</h1>
        <form method="post" class="row g-3">
          <div class="col-12">
            <label class="form-label">Username or email</label>
            <input type="text" name="username" class="form-control" required>
          </div>
          <div class="col-12">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-primary">Login</button>
            <a class="btn btn-outline-secondary" href="{{ url_for('forgot_password') }}">Forgot password</a>
{% if self_registration_enabled %}<a class="btn btn-outline-secondary" href="{{ url_for('self_register') }}">Register</a>{% endif %}
            <a class="btn btn-outline-secondary" href="{{ url_for('policy') }}">Policy</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
