
{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="card shadow-sm">
      <div class="card-body p-4">
        <h1 class="h3 mb-3">Complete registration</h1>
        <p class="text-muted">This invite is reserved for <strong>{{ invite_email }}</strong>. After registration, you will receive a separate email confirmation link.</p>
        <form method="post" class="row g-3">
          <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
          <div class="col-md-6">
            <label class="form-label">Username</label>
            <input type="text" name="username" id="usernameInput" value="{{ form_data.username if form_data else '' }}" class="form-control" required><div id="usernameFeedback" class="form-text"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Email</label>
            <input type="email" name="email" id="emailInput" value="{{ form_data.email if form_data else invite_email }}" class="form-control" required><div id="emailFeedback" class="form-text"></div>
          </div>
          <div class="col-md-6">
            <label class="form-label">Password</label>
            <input type="password" name="password" class="form-control" minlength="8" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Repeat password</label>
            <input type="password" name="password2" class="form-control" minlength="8" required>
          </div>
          <div class="col-md-6">
            <label class="form-label">Theme</label>
            <select name="theme_pref" class="form-select">
              <option value="auto" {% if (form_data.theme_pref if form_data else 'auto') == 'auto' %}selected{% endif %}>Auto</option>
              <option value="light" {% if (form_data.theme_pref if form_data else 'auto') == 'light' %}selected{% endif %}>Light</option>
              <option value="dark" {% if (form_data.theme_pref if form_data else 'auto') == 'dark' %}selected{% endif %}>Dark</option>
            </select>
          </div>
          <div class="col-12">
            <button class="btn btn-primary">Create account</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="{{ url_for('static', filename='js/live_validation.js') }}"></script>

{% endblock %}
